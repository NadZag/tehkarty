<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тех.карты — себестоимость</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--paper:#F7F4EC;--paper-2:#EFEADC;--ink:#2A2520;--herb:#4F6B3C;--herb-dark:#3C5230;--paprika:#B2492F;--amber:#A8782B;--sand:#DDD4C0;--slate:#8A8174;--white:#FFFFFF;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}
#app{max-width:1200px;margin:0 auto;padding:24px 20px 60px;}
.topbar{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:0;border-bottom:2px solid var(--ink);padding-bottom:14px;}
.brand .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--herb-dark);text-transform:uppercase;display:block;margin-bottom:4px;}
.brand h1{font-family:'Fraunces',serif;font-weight:600;font-size:26px;margin:0;}
.topbar-right{display:flex;align-items:center;gap:14px;}
.currency-field{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--slate);}
.currency-field input{width:44px;text-align:center;border:1px solid var(--sand);background:var(--white);border-radius:4px;padding:4px 2px;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--ink);}
.save-status{font-size:11px;color:var(--slate);font-family:'IBM Plex Mono',monospace;min-width:80px;text-align:right;}
.save-status.ok{color:var(--herb-dark);}
.save-status.err{color:var(--paprika);}
.tabs{display:flex;gap:4px;margin-top:14px;}
.tab-btn{font-family:'Inter',sans-serif;font-weight:600;font-size:13px;background:transparent;border:1px solid var(--ink);border-bottom:none;padding:8px 16px;border-radius:6px 6px 0 0;cursor:pointer;color:var(--ink);position:relative;top:1px;}
.tab-btn.active{background:var(--ink);color:var(--paper);}
.tab-btn:not(.active):hover{background:var(--paper-2);}
.tab-btn.semi-tab{border-color:var(--amber);color:var(--amber);}
.tab-btn.semi-tab.active{background:var(--amber);color:var(--white);border-color:var(--amber);}
.panel{background:var(--white);border:1px solid var(--sand);border-radius:10px;padding:20px;}
.btn{font-family:'Inter',sans-serif;font-weight:600;font-size:13px;cursor:pointer;border-radius:7px;padding:9px 16px;border:1px solid transparent;}
.btn-primary{background:var(--herb);color:var(--white);}.btn-primary:hover{background:var(--herb-dark);}
.btn-amber{background:var(--amber);color:var(--white);}.btn-amber:hover{background:#8a6020;}
.btn-ghost{background:transparent;border:1px solid var(--sand);color:var(--ink);}.btn-ghost:hover{background:var(--paper-2);}
.btn-danger{background:transparent;border:1px solid var(--paprika);color:var(--paprika);}.btn-danger:hover{background:var(--paprika);color:var(--white);}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:5px;}
input[type=text],input[type=number]{font-family:'Inter',sans-serif;font-size:13px;color:var(--ink);border:1px solid var(--sand);border-radius:6px;padding:8px 10px;background:var(--white);width:100%;}
input:focus,select:focus{outline:2px solid var(--herb);outline-offset:1px;}
select{font-family:'Inter',sans-serif;font-size:13px;color:var(--ink);border:1px solid var(--sand);border-radius:6px;padding:8px 10px;background:var(--white);width:100%;}
label.lbl{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--slate);font-weight:600;display:block;margin-bottom:4px;}
.field{margin-bottom:12px;}
.row-fields{display:flex;gap:10px;flex-wrap:wrap;}
.row-fields>.field{flex:1;min-width:110px;}
.mono{font-family:'IBM Plex Mono',monospace;}
.muted{color:var(--slate);}
.empty-state{padding:40px 20px;text-align:center;color:var(--slate);}
.empty-state h3{font-family:'Fraunces',serif;color:var(--ink);font-size:18px;margin:0 0 8px;}
.empty-state p{margin:0 0 16px;font-size:13px;}
.error-banner{background:#FBEAE5;border:1px solid var(--paprika);color:var(--paprika);padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:12px;}
table{width:100%;border-collapse:collapse;}
thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--slate);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--sand);}
tbody td{padding:9px 10px;border-bottom:1px solid var(--paper-2);font-size:13px;vertical-align:middle;}
tbody tr:hover{background:var(--paper-2);}
td.num,th.num{text-align:right;}
.tag{display:inline-block;background:var(--paper-2);color:var(--slate);font-size:11px;padding:2px 8px;border-radius:20px;}
.tag-amber{background:#F6EBD9;color:var(--amber);}
.actions-cell{white-space:nowrap;text-align:right;}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--slate);font-size:13px;padding:4px 6px;border-radius:4px;}
.icon-btn:hover{background:var(--paper-2);color:var(--ink);}
.confirm-inline{display:flex;gap:6px;justify-content:flex-end;align-items:center;}
.confirm-inline span{font-size:12px;color:var(--paprika);}
.inline-form-row td{background:var(--paper-2);padding:12px;}
.inline-form-wrap{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
.ifield{display:flex;flex-direction:column;}
.ifield label{margin-bottom:3px;}
.inline-hint{font-size:11px;color:var(--herb-dark);font-family:'IBM Plex Mono',monospace;margin-top:6px;}
/* left-right layout */
.lr-layout{display:flex;gap:18px;align-items:flex-start;margin-top:16px;}
.lr-list{width:250px;flex-shrink:0;}
.lr-list-item{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:10px 12px;border:1px solid var(--sand);border-radius:8px;margin-bottom:8px;cursor:pointer;background:var(--white);}
.lr-list-item:hover{border-color:var(--herb);}
.lr-list-item.selected{border-color:var(--ink);background:var(--paper-2);}
.lr-list-item .lname{font-weight:600;font-size:13px;}
.lr-list-item .lsub{font-size:11px;color:var(--slate);}
.fc-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px;flex-shrink:0;white-space:nowrap;}
.fc-good{background:#E7EFE1;color:var(--herb-dark);}
.fc-warn{background:#F6EBD9;color:var(--amber);}
.fc-bad{background:#FBEAE5;color:var(--paprika);}
.lr-editor{flex:1;min-width:0;display:flex;gap:18px;align-items:flex-start;flex-wrap:wrap;}
.lr-form{flex:1;min-width:300px;}
.form-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px;}
.lines-header{display:flex;justify-content:space-between;align-items:center;margin:16px 0 10px;}
.lines-header h4{font-family:'Fraunces',serif;font-size:14px;margin:0;font-weight:600;}
/* ingredient line inside a card/semi */
.ing-line{border:1px solid var(--sand);border-radius:8px;padding:12px;margin-bottom:10px;background:var(--paper-2);}
.ing-line.semi-ref{border-color:var(--amber);}
.ing-line-top{display:flex;gap:8px;align-items:center;margin-bottom:10px;}
.ing-line-top select{flex:1;background:var(--white);}
.ing-line-fields{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;}
.lf{display:flex;flex-direction:column;}
.lf label{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--slate);font-weight:600;margin-bottom:3px;white-space:nowrap;}
.lf input[type=number]{width:80px;background:var(--white);}
.cb-label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink);white-space:nowrap;background:var(--white);border:1px solid var(--sand);border-radius:6px;padding:0 10px;cursor:pointer;height:37px;}
.cb-label input{margin:0;width:auto;}
.netto-row{display:flex;gap:6px;align-items:center;}
.cost-disp{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;white-space:nowrap;padding:8px 0;}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;}
.stat-hint{font-size:10px;color:var(--slate);margin-top:2px;}
/* ticket */
.ticket{width:245px;flex-shrink:0;background:var(--white);border:1px solid var(--sand);border-top:3px dashed var(--ink);border-bottom:3px dashed var(--ink);border-radius:4px;padding:18px 16px;box-shadow:0 4px 14px rgba(42,37,32,.06);transform:rotate(-.3deg);}
.tkt-eye{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--slate);text-transform:uppercase;display:flex;justify-content:space-between;margin-bottom:2px;}
.tkt-title{font-family:'Fraunces',serif;font-weight:600;font-size:15px;margin:0 0 10px;border-bottom:1px dashed var(--sand);padding-bottom:8px;}
.tkt-line{display:flex;align-items:baseline;gap:6px;margin-bottom:5px;font-size:12px;}
.tkt-line .ln{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:115px;}
.tkt-line .ld{flex:1;border-bottom:1px dotted var(--slate);transform:translateY(-3px);min-width:4px;}
.tkt-line .lv{font-family:'IBM Plex Mono',monospace;white-space:nowrap;}
.tkt-div{border-top:1px dashed var(--sand);margin:8px 0;}
.tkt-row{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px;}
.tkt-row.big{font-weight:700;font-size:14px;font-family:'IBM Plex Mono',monospace;}
.tkt-fc{margin-top:8px;text-align:center;padding:7px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;line-height:1.6;}
.tkt-empty{font-size:12px;color:var(--slate);text-align:center;padding:12px 0;}
.semi-badge{display:inline-block;font-size:10px;background:#F6EBD9;color:var(--amber);border-radius:10px;padding:1px 6px;margin-left:4px;vertical-align:middle;}
@media(max-width:760px){.lr-layout,.lr-editor{flex-direction:column;}.lr-list,.ticket{width:100%;}.ticket{transform:none;}}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){
"use strict";

// ── STATE ──────────────────────────────────────────────────
var S = {
  tab: 'ingredients',
  ingredients: [],
  semis: [],
  techcards: [],
  settings: { currency: '\u20b4' },
  error: null,
  editingIng: null,
  confirmDelete: null,
  selectedSemiId: null,
  selectedCardId: null
};

// ── PERSISTENCE (localStorage) ─────────────────────────────
function save() {
  try {
    localStorage.setItem('tk_ingredients', JSON.stringify(S.ingredients));
    localStorage.setItem('tk_semis', JSON.stringify(S.semis));
    localStorage.setItem('tk_techcards', JSON.stringify(S.techcards));
    localStorage.setItem('tk_settings', JSON.stringify(S.settings));
    showSaveStatus('ok');
  } catch(e) { showSaveStatus('err'); }
}
var saveDebounced = debounce(save, 600);

function load() {
  try {
    var i = localStorage.getItem('tk_ingredients'); if(i) S.ingredients = JSON.parse(i);
    var sm = localStorage.getItem('tk_semis'); if(sm) S.semis = JSON.parse(sm);
    var tc = localStorage.getItem('tk_techcards'); if(tc) S.techcards = JSON.parse(tc);
    var st = localStorage.getItem('tk_settings'); if(st) S.settings = JSON.parse(st);
  } catch(e) { S.error = 'Не удалось загрузить данные.'; }
}

function showSaveStatus(st) {
  var el = document.getElementById('save-status-el');
  if(!el) return;
  if(st === 'ok') { el.textContent = 'Сохранено'; el.className = 'save-status ok'; }
  else { el.textContent = 'Ошибка сохранения'; el.className = 'save-status err'; }
  setTimeout(function(){ if(el) el.textContent = ''; }, 3000);
}

// ── HELPERS ────────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function debounce(fn, d) { var t; return function(){ var a=arguments; clearTimeout(t); t=setTimeout(function(){ fn.apply(null,a); }, d); }; }
function esc(s) { return String(s==null?'':s).replace(/[&<>"']/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];}); }
function fmt(n) { if(isNaN(n)||n==null)n=0; return n.toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function cur() { return S.settings.currency || '\u20b4'; }

function ingById(id) { return S.ingredients.find(function(i){ return i.id===id; }) || null; }
function semiById(id) { return S.semis.find(function(s){ return s.id===id; }) || null; }
function findLine(lines, lid) { return (lines||[]).find(function(l){ return l.id===lid; }) || null; }

function ppu(ing) {
  var sz=parseFloat(ing.packageSize)||0, pr=parseFloat(ing.packagePrice)||0;
  return sz>0 ? pr/sz : 0;
}

function autoNetto(ing, brutto, uc, ut) {
  var f=1;
  if(uc) f *= (1-(parseFloat(ing.lossCleaning)||0)/100);
  if(ut) f *= (1-(parseFloat(ing.lossThermo)||0)/100);
  return Math.round(brutto*f*100)/100;
}

function computeSemi(semi) {
  var totalCost=0, totalNetto=0;
  var lines = (semi.lines||[]).map(function(line){
    var ing = ingById(line.ingredientId);
    var br = parseFloat(line.brutto)||0;
    var cost = ing ? br*ppu(ing) : 0;
    var nt;
    if(line.nettoManual && line.netto!=null && line.netto!=='') {
      nt = parseFloat(line.netto)||0;
    } else {
      nt = ing ? autoNetto(ing, br, line.useCleaning, line.useThermo) : 0;
    }
    totalCost += cost; totalNetto += nt;
    return { line:line, ing:ing, br:br, cost:cost, nt:nt };
  });
  var yieldQty = parseFloat(semi.yieldQty)||0;
  var costPerUnit = yieldQty>0 ? totalCost/yieldQty : 0;
  return { lines:lines, totalCost:totalCost, totalNetto:totalNetto, yieldQty:yieldQty, costPerUnit:costPerUnit };
}

function computeCard(card) {
  var totalCost=0, totalNetto=0;
  var lines = (card.lines||[]).map(function(line){
    var cost=0, nt=0, refName='—', unit='';
    if(line.type==='ing') {
      var ing = ingById(line.refId);
      if(ing) {
        var br = parseFloat(line.brutto)||0;
        cost = br*ppu(ing);
        if(line.nettoManual && line.netto!=null && line.netto!=='') {
          nt = parseFloat(line.netto)||0;
        } else {
          nt = autoNetto(ing, br, line.useCleaning, line.useThermo);
        }
        refName = ing.name; unit = ing.unit;
      }
    } else {
      var semi = semiById(line.refId);
      if(semi) {
        var d = computeSemi(semi);
        var qty = parseFloat(line.qty)||0;
        cost = qty * d.costPerUnit;
        nt = qty;
        refName = semi.name; unit = semi.unit||'г';
      }
    }
    totalCost += cost; totalNetto += nt;
    return { line:line, cost:cost, nt:nt, refName:refName, unit:unit };
  });
  var sp = parseFloat(card.sellingPrice)||0;
  var fc = sp>0 ? (totalCost/sp)*100 : null;
  var margin = sp>0 ? sp-totalCost : null;
  var markup = totalCost>0&&sp>0 ? ((sp-totalCost)/totalCost)*100 : null;
  return { lines:lines, totalCost:totalCost, totalNetto:totalNetto, sp:sp, fc:fc, margin:margin, markup:markup };
}

function fcCls(p) {
  if(p===null) return '';
  if(p<=33) return 'fc-good';
  if(p<=45) return 'fc-warn';
  return 'fc-bad';
}

// ── RENDER ROOT ────────────────────────────────────────────
function render() {
  var app = document.getElementById('app');
  var h = topbarH();
  h += '<main id="content" style="margin-top:0;">';
  if(S.error) h += '<div class="error-banner" style="margin-top:16px;"><span>'+esc(S.error)+'</span><button class="btn btn-ghost btn-sm" data-action="dismiss-error">Скрыть</button></div>';
  if(S.tab==='ingredients') h += ingTabH();
  else if(S.tab==='semis') h += semisTabH();
  else h += tcTabH();
  h += '</main>';
  app.innerHTML = h;
}

function topbarH() {
  return '<header class="topbar">'+
    '<div class="brand">'+
      '<span class="eyebrow">учёт кухни</span>'+
      '<h1>Тех.карты и себестоимость</h1>'+
      '<div class="tabs">'+
        '<button class="tab-btn '+(S.tab==='ingredients'?'active':'')+'" data-action="set-tab" data-tab="ingredients">Сырьё</button>'+
        '<button class="tab-btn semi-tab '+(S.tab==='semis'?'active':'')+'" data-action="set-tab" data-tab="semis">Полуфабрикаты</button>'+
        '<button class="tab-btn '+(S.tab==='techcards'?'active':'')+'" data-action="set-tab" data-tab="techcards">Тех.карты</button>'+
      '</div>'+
    '</div>'+
    '<div class="topbar-right">'+
      '<span id="save-status-el" class="save-status"></span>'+
      '<div class="currency-field">Валюта&nbsp;<input type="text" maxlength="3" id="currency-input" value="'+esc(cur())+'"></div>'+
    '</div>'+
  '</header>';
}

// ── INGREDIENTS TAB ────────────────────────────────────────
function ingFormRow(ing) {
  var nw = !ing;
  var v = ing || {name:'',unit:'г',category:'',packagePrice:'',packageSize:'',lossCleaning:'',lossThermo:''};
  var id = nw ? 'new' : ing.id;
  var pr=parseFloat(v.packagePrice)||0, sz=parseFloat(v.packageSize)||0;
  var hint = sz>0 ? 'Цена за 1 '+v.unit+': '+fmt(pr/sz)+' '+cur() : 'Укажите объём упаковки → рассчитается цена за единицу';
  return '<tr class="inline-form-row" data-row-id="'+id+'"><td colspan="7">'+
    '<div class="inline-form-wrap">'+
      '<div class="ifield" style="flex:2;min-width:140px"><label class="lbl">Название</label><input type="text" data-f="name" value="'+esc(v.name)+'" placeholder="Мука пшеничная"></div>'+
      '<div class="ifield" style="width:105px"><label class="lbl">Категория</label><input type="text" data-f="category" value="'+esc(v.category)+'" placeholder="Бакалея"></div>'+
      '<div class="ifield" style="width:58px"><label class="lbl">Ед.</label><select data-f="unit">'+
        ['г','мл','шт'].map(function(u){return'<option value="'+u+'" '+(v.unit===u?'selected':'')+'>'+u+'</option>';}).join('')+
      '</select></div>'+
      '<div class="ifield" style="width:88px"><label class="lbl">Закупка, '+esc(cur())+'</label><input type="number" step="0.01" min="0" data-f="packagePrice" value="'+esc(v.packagePrice)+'" placeholder="450"></div>'+
      '<div class="ifield" style="width:88px"><label class="lbl">Объём уп.</label><input type="number" step="0.01" min="0" data-f="packageSize" value="'+esc(v.packageSize)+'" placeholder="1000"></div>'+
      '<div class="ifield" style="width:72px"><label class="lbl">% чистки</label><input type="number" step="1" min="0" max="99" data-f="lossCleaning" value="'+esc(v.lossCleaning)+'" placeholder="0"></div>'+
      '<div class="ifield" style="width:72px"><label class="lbl">% термо</label><input type="number" step="1" min="0" max="99" data-f="lossThermo" value="'+esc(v.lossThermo)+'" placeholder="0"></div>'+
      '<div class="ifield" style="display:flex;gap:6px;align-self:flex-end">'+
        '<button class="btn btn-primary btn-sm" data-action="save-ing" data-id="'+id+'">Сохранить</button>'+
        '<button class="btn btn-ghost btn-sm" data-action="cancel-ing">Отмена</button>'+
      '</div>'+
    '</div>'+
    '<div class="inline-hint" data-hint-for="'+id+'">'+hint+'</div>'+
  '</td></tr>';
}

function ingTabH() {
  var h = '<div class="panel" style="margin-top:16px;">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">'+
       '<h3 style="font-family:Fraunces,serif;margin:0;font-size:16px;">Сырьё и закупочные цены</h3>'+
       (S.editingIng ? '' : '<button class="btn btn-primary" data-action="new-ing">+ Добавить сырьё</button>')+
       '</div>';
  if(!S.ingredients.length && S.editingIng!=='new') {
    h += '<div class="empty-state"><h3>Пока нет ни одного ингредиента</h3><p>Добавьте сырьё с ценой — это основа расчёта себестоимости.</p>'+
         '<button class="btn btn-primary" data-action="new-ing">+ Добавить сырьё</button></div></div>'; return h;
  }
  h += '<table><thead><tr><th>Название</th><th>Категория</th><th>Ед.</th><th>% чистки</th><th>% термо</th><th class="num">Цена за ед.</th><th></th></tr></thead><tbody>';
  if(S.editingIng==='new') h += ingFormRow(null);
  S.ingredients.forEach(function(ing){
    if(S.editingIng===ing.id){h+=ingFormRow(ing);return;}
    var p=ppu(ing), lc=parseFloat(ing.lossCleaning)||0, lt=parseFloat(ing.lossThermo)||0;
    h += '<tr>'+
      '<td>'+esc(ing.name)+'</td>'+
      '<td>'+(ing.category?'<span class="tag">'+esc(ing.category)+'</span>':'<span class="muted">—</span>')+'</td>'+
      '<td>'+esc(ing.unit)+'</td>'+
      '<td class="muted" style="font-size:12px;">'+(lc?lc+'%':'—')+'</td>'+
      '<td class="muted" style="font-size:12px;">'+(lt?lt+'%':'—')+'</td>'+

function saveIngFromForm(id) {
  var row = document.querySelector('[data-row-id="'+id+'"]'); if(!row) return;
  var v = {}; row.querySelectorAll('[data-f]').forEach(function(i){ v[i.getAttribute('data-f')]=i.value; });
  if(!v.name||!v.name.trim()){S.error='Укажите название ингредиента.';render();return;}
  if(id==='new'){
    S.ingredients.push({id:uid(),name:v.name.trim(),unit:v.unit,category:v.category||'',
      packagePrice:v.packagePrice||0,packageSize:v.packageSize||0,
      lossCleaning:v.lossCleaning||0,lossThermo:v.lossThermo||0});
  } else {
    var ing=ingById(id);
    if(ing) Object.assign(ing,{name:v.name.trim(),unit:v.unit,category:v.category||'',
      packagePrice:v.packagePrice||0,packageSize:v.packageSize||0,
      lossCleaning:v.lossCleaning||0,lossThermo:v.lossThermo||0});
  }
  S.editingIng=null; S.error=null; save(); render();
}

function newSemiLine(semiId) {
  var semi = semiById(semiId); if(!semi) return;
  semi.lines = semi.lines||[];
  semi.lines.push({id:uid(),ingredientId:'',brutto:'',netto:'',nettoManual:false,useCleaning:false,useThermo:false});
  saveDebounced(); render();
}

function newCardLine(cardId) {
  var card = S.techcards.find(function(c){return c.id===cardId;}); if(!card) return;
  card.lines = card.lines||[];
  card.lines.push({id:uid(),type:'ing',refId:'',brutto:'',qty:'',netto:'',nettoManual:false,useCleaning:false,useThermo:false});
  saveDebounced(); render();
}

// ── EVENTS ─────────────────────────────────────────────────
document.getElementById('app').addEventListener('click', function(e){
  var t = e.target.closest('[data-action]'); if(!t) return;
  var a = t.getAttribute('data-action');

  // tabs / global
  if(a==='import-ingredients'){ showImportModal(); }
  else if(a==='import-semis'){ showImportSemisModal(); }
  else if(a==='export-data'){ exportData(); }
  else if(a==='restore-backup'){ showFullImportModal(); }
  else if(a==='set-tab'){S.tab=t.getAttribute('data-tab');S.editingIng=null;S.confirmDelete=null;render();}
  else if(a==='dismiss-error'){S.error=null;render();}

  // ingredients
  else if(a==='new-ing'){S.editingIng='new';render();focus('[data-f="name"]');}
  else if(a==='edit-ing'){S.editingIng=t.getAttribute('data-id');render();}
  else if(a==='cancel-ing'){S.editingIng=null;render();}
  else if(a==='save-ing'){saveIngFromForm(t.getAttribute('data-id'));}
  else if(a==='ask-del-ing'){S.confirmDelete={type:'ing',id:t.getAttribute('data-id')};render();}
  else if(a==='confirm-del-ing'){S.ingredients=S.ingredients.filter(function(i){return i.id!==t.getAttribute('data-id');});S.confirmDelete=null;save();render();}
  else if(a==='cancel-del'){S.confirmDelete=null;render();}

  // semis
  else if(a==='new-semi'){var sm={id:uid(),name:'',category:'',unit:'\u0433',yieldQty:'',lines:[]};S.semis.unshift(sm);S.selectedSemiId=sm.id;save();render();}
  else if(a==='select-semi'){S.selectedSemiId=t.getAttribute('data-id');S.confirmDelete=null;render();}
  else if(a==='ask-del-semi'){S.confirmDelete={type:'semi',id:t.getAttribute('data-id')};render();}
  else if(a==='confirm-del-semi'){S.semis=S.semis.filter(function(s){return s.id!==t.getAttribute('data-id');});if(S.selectedSemiId===t.getAttribute('data-id'))S.selectedSemiId=null;S.confirmDelete=null;save();render();}
  else if(a==='add-semi-line'){newSemiLine(t.getAttribute('data-id'));}
  else if(a==='rm-semi-line'){var sm=semiById(t.getAttribute('data-semi'));if(sm){sm.lines=(sm.lines||[]).filter(function(l){return l.id!==t.getAttribute('data-line');});saveDebounced();render();}}
  else if(a==='reset-semi-netto'){
    var sm=semiById(t.getAttribute('data-semi'));if(!sm)return;
    var line=findLine(sm.lines,t.getAttribute('data-line'));if(!line)return;
    line.nettoManual=false;var ing=ingById(line.ingredientId);
    line.netto=ing?autoNetto(ing,parseFloat(line.brutto)||0,line.useCleaning,line.useThermo):0;
    saveDebounced();render();
  }

  // techcards
  else if(a==='new-card'){var c={id:uid(),name:'',category:'',sellingPrice:'',lines:[]};S.techcards.unshift(c);S.selectedCardId=c.id;save();render();}
  else if(a==='select-card'){S.selectedCardId=t.getAttribute('data-id');S.confirmDelete=null;render();}
  else if(a==='ask-del-card'){S.confirmDelete={type:'card',id:t.getAttribute('data-id')};render();}
  else if(a==='confirm-del-card'){S.techcards=S.techcards.filter(function(c){return c.id!==t.getAttribute('data-id');});if(S.selectedCardId===t.getAttribute('data-id'))S.selectedCardId=null;S.confirmDelete=null;save();render();}
  else if(a==='add-card-line'){newCardLine(t.getAttribute('data-id'));}
  else if(a==='rm-card-line'){var card=S.techcards.find(function(c){return c.id===t.getAttribute('data-id');});if(card){card.lines=(card.lines||[]).filter(function(l){return l.id!==t.getAttribute('data-line');});saveDebounced();render();}}
  else if(a==='reset-card-netto'){
    var card=S.techcards.find(function(c){return c.id===t.getAttribute('data-id');});if(!card)return;
    var line=findLine(card.lines,t.getAttribute('data-line'));if(!line)return;
    line.nettoManual=false;var ing=ingById(line.refId);
    line.netto=ing?autoNetto(ing,parseFloat(line.brutto)||0,line.useCleaning,line.useThermo):0;
    saveDebounced();render();
  }
});

    var hel=row.querySelector('[data-hint-for]');if(!hel)return;
    var pr=parseFloat(v.packagePrice)||0,sz=parseFloat(v.packageSize)||0;

  if(t.matches('[data-sf]')){

    line.brutto=t.value;
    if(!line.nettoManual){var ing=ingById(line.ingredientId);line.netto=ing?autoNetto(ing,parseFloat(t.value)||0,line.useCleaning,line.useThermo):0;}
    saveDebounced();softRefresh();
  }
  if(t.matches('input[data-slf="netto"]')){
    var semi=S.semis.find(function(s){return s.id===S.selectedSemiId;});if(!semi)return;
    var line=findLine(semi.lines,t.getAttribute('data-line'));if(!line)return;
    line.netto=t.value;line.nettoManual=true;saveDebounced();softRefresh();
  }

  // card fields
  if(t.matches('[data-cf]')){
    var card=S.techcards.find(function(c){return c.id===S.selectedCardId;});if(!card)return;
    card[t.getAttribute('data-cf')]=t.value;saveDebounced();softRefresh();
  }
  if(t.matches('input[data-clf="brutto"]')){
    var card=S.techcards.find(function(c){return c.id===S.selectedCardId;});if(!card)return;
    var line=findLine(card.lines,t.getAttribute('data-line'));if(!line)return;
    line.brutto=t.value;
    if(!line.nettoManual){var ing=ingById(line.refId);line.netto=ing?autoNetto(ing,parseFloat(t.value)||0,line.useCleaning,line.useThermo):0;}
    saveDebounced();softRefresh();
  }
  if(t.matches('input[data-clf="netto"]')){
    var card=S.techcards.find(function(c){return c.id===S.selectedCardId;});if(!card)return;
    var line=findLine(card.lines,t.getAttribute('data-line'));if(!line)return;
    line.netto=t.value;line.nettoManual=true;saveDebounced();softRefresh();
  }
  if(t.matches('input[data-clf="qty"]')){
    var card=S.techcards.find(function(c){return c.id===S.selectedCardId;});if(!card)return;
    var line=findLine(card.lines,t.getAttribute('data-line'));if(!line)return;
    line.qty=t.value;saveDebounced();softRefresh();
  }
});

document.getElementById('app').addEventListener('change', function(e){
  var t = e.target;

  // semi ingredient select
  if(t.matches('select[data-slf="ingredientId"]')){
    var semi=S.semis.find(function(s){return s.id===S.selectedSemiId;});if(!semi)return;
    var line=findLine(semi.lines,t.getAttribute('data-line'));if(!line)return;
    line.ingredientId=t.value;line.nettoManual=false;line.useCleaning=false;line.useThermo=false;
    var ing=ingById(t.value);line.netto=ing?autoNetto(ing,parseFloat(line.brutto)||0,false,false):0;
    saveDebounced();render();
  }
  // semi checkbox
  if(t.matches('input[type=checkbox][data-slf]')){
    var semi=S.semis.find(function(s){return s.id===S.selectedSemiId;});if(!semi)return;
    var line=findLine(semi.lines,t.getAttribute('data-line'));if(!line)return;
    line[t.getAttribute('data-slf')]=t.checked;
    if(!line.nettoManual){var ing=ingById(line.ingredientId);line.netto=ing?autoNetto(ing,parseFloat(line.brutto)||0,line.useCleaning,line.useThermo):0;}
    saveDebounced();softRefresh();
  }

  // card ref select (ingredient or semi)
  if(t.matches('select[data-clf="ref"]')){
    var card=S.techcards.find(function(c){return c.id===S.selectedCardId;});if(!card)return;
    var line=findLine(card.lines,t.getAttribute('data-line'));if(!line)return;
    var val=t.value;
    if(!val){line.type='ing';line.refId='';} 
    else {
      var parts=val.split(':');
      line.type=parts[0];line.refId=parts[1];
    }
    line.nettoManual=false;line.useCleaning=false;line.useThermo=false;line.brutto='';line.netto='';line.qty='';
    saveDebounced();render();
  }
  // card checkbox
  if(t.matches('input[type=checkbox][data-clf]')){
    var card=S.techcards.find(function(c){return c.id===S.selectedCardId;});if(!card)return;
    var line=findLine(card.lines,t.getAttribute('data-line'));if(!line)return;
    line[t.getAttribute('data-clf')]=t.checked;
    if(!line.nettoManual&&line.type==='ing'){var ing=ingById(line.refId);line.netto=ing?autoNetto(ing,parseFloat(line.brutto)||0,line.useCleaning,line.useThermo):0;}
    saveDebounced();softRefresh();
  }
  // semi unit
  if(t.matches('select[data-sf="unit"]')){
    var semi=S.semis.find(function(s){return s.id===S.selectedSemiId;});if(!semi)return;
    semi.unit=t.value;saveDebounced();softRefresh();
  }
});

function softRefresh(){
  var ticketEl=document.getElementById('ticket');
  var card=S.techcards.find(function(c){return c.id===S.selectedCardId;});
  if(ticketEl&&card) ticketEl.innerHTML=ticketH(card);
  // update stat-val (выход)
  if(card){var d=computeCard(card);var sv=document.querySelector('.stat-val');if(sv)sv.textContent=fmt(d.totalNetto);}
  // update semi summary
  var semi=S.semis.find(function(s){return s.id===S.selectedSemiId;});
  if(semi){
    var d2=computeSemi(semi);
    var boxes=document.querySelectorAll('.stat-val');
    // re-render full semi form is safer
    var sf=document.getElementById('semi-form');
    if(sf) sf.innerHTML=semiFormH(semi);
  }
  // update lists
  var tcl=document.getElementById('tc-list');if(tcl) tcl.innerHTML=tcListH();
  var sl=document.getElementById('semi-list');if(sl) sl.innerHTML=semiListH();
}

  document.body.appendChild(overlay);

function doImport(replace, overlay) {
  var text = document.getElementById('import-text').value.trim();
  var msg = document.getElementById('imp-msg');
  try {
    var data = JSON.parse(text);
    if (!Array.isArray(data)) throw new Error('Ожидается массив JSON');
    // ensure ids
    data.forEach(function(item){ if(!item.id) item.id = Date.now().toString(36)+Math.random().toString(36).slice(2,6); });
    if (replace) {
      S.ingredients = data;
    } else {
      // add only those not already present by name
      var existing = S.ingredients.map(function(i){ return i.name.toLowerCase(); });
      var added = 0;
      data.forEach(function(item){
        if(existing.indexOf(item.name.toLowerCase()) === -1){ S.ingredients.push(item); added++; }
      });
      msg.style.color = '#4F6B3C';
      msg.textContent = 'Добавлено: ' + added + ' новых ингредиентов (дубликаты пропущены).';
    }
    save();
    setTimeout(function(){ document.body.removeChild(overlay); render(); }, replace ? 500 : 1500);
    if(replace){ msg.style.color='#4F6B3C'; msg.textContent='Загружено '+data.length+' ингредиентов!'; }
  } catch(e) {
    msg.style.color = '#B2492F';
    msg.textContent = 'Ошибка: ' + e.message + '. Проверьте что скопировали весь файл целиком.';
  }
}

function exportData() {
  var data = { ingredients: S.ingredients, semis: S.semis, techcards: S.techcards, settings: S.settings, exportedAt: new Date().toISOString() };
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tehkarty_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function doImportSemis(replace, overlay) {
  var text = document.getElementById('semis-import-text').value.trim();
  var msg = document.getElementById('semi-imp-msg');
  try {
    var data = JSON.parse(text);
    if (!Array.isArray(data)) throw new Error('Ожидается массив JSON');
    // match ingredientId by name
    data.forEach(function(semi){
      if (!semi.id) semi.id = Date.now().toString(36)+Math.random().toString(36).slice(2,6);
      (semi.lines||[]).forEach(function(line){
        if (!line.id) line.id = Date.now().toString(36)+Math.random().toString(36).slice(2,6);
        if (line.ingredientName && !line.ingredientId) {
          var match = S.ingredients.find(function(i){
            return i.name.toLowerCase().trim() === line.ingredientName.toLowerCase().trim();
          });
          if (match) line.ingredientId = match.id;
        }
      });
    });
    if (replace) {
      S.semis = data;
      msg.style.color='#4F6B3C'; msg.textContent='Загружено '+data.length+' полуфабрикатов!';
    } else {
      var existing = S.semis.map(function(s){ return s.name.toLowerCase(); });
      var added = 0;
      data.forEach(function(item){
        if(existing.indexOf(item.name.toLowerCase()) === -1){ S.semis.push(item); added++; }
      });
      msg.style.color='#4F6B3C'; msg.textContent='Добавлено: '+added+' новых полуфабрикатов.';
    }
    save();
    setTimeout(function(){ document.body.removeChild(overlay); render(); }, 1200);
  } catch(e) {
    msg.style.color='#B2492F'; msg.textContent='Ошибка: '+e.message;
  }
}
